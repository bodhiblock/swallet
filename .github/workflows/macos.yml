name: Build macOS DMG

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" crates/swallet-tauri/tauri.conf.json
          echo "App version: $VERSION"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-macos-arm64-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-macos-arm64-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build macOS DMG (Apple Silicon)
        working-directory: crates/swallet-tauri
        run: cargo tauri build --target aarch64-apple-darwin -- --no-default-features

      - name: Rename DMG
        run: |
          find target -name "*.dmg" -type f
          DMG=$(find target -name "*.dmg" -type f | head -1)
          cp "$DMG" swallet-macos-arm64.dmg
          echo "DMG: $DMG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swallet-macos-arm64
          path: swallet-macos-arm64.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: swallet-macos-arm64.dmg
