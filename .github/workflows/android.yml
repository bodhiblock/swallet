name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  NDK_VERSION: "27.0.12077973"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/local/graalvm /usr/local/.ghcup /usr/local/share/powershell
          sudo apt-get clean
          df -h /

      - uses: actions/checkout@v4

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" crates/swallet-tauri/tauri.conf.json
          echo "App version: $VERSION"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true
          shared-key: android-aarch64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Build frontend
        run: cd ui && npm run build

      - name: Install Tauri CLI
        run: |
          curl -LsSf https://github.com/cargo-bins/cargo-binstall/releases/latest/download/cargo-binstall-x86_64-unknown-linux-musl.tgz | tar xzf - -C ~/.cargo/bin
          cargo binstall tauri-cli --version "^2" -y

      - name: Configure NDK toolchain
        run: |
          NDK_HOME="${ANDROID_HOME}/ndk/${{ env.NDK_VERSION }}"
          TOOLCHAIN="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          echo "NDK_HOME=${NDK_HOME}" >> $GITHUB_ENV
          echo "${TOOLCHAIN}/bin" >> $GITHUB_PATH
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_aarch64_linux_android=${TOOLCHAIN}/bin/llvm-ranlib" >> $GITHUB_ENV

      - name: Initialize Android project
        working-directory: crates/swallet-tauri
        run: cargo tauri android init

      - name: Copy app icons
        run: cp -r crates/swallet-tauri/icons/android/* crates/swallet-tauri/gen/android/app/src/main/res/

      - name: Build Android APK (release, aarch64 only)
        working-directory: crates/swallet-tauri
        run: cargo tauri android build --target aarch64

      - name: Sign APK with debug keystore
        run: |
          UNSIGNED=$(find crates/swallet-tauri/gen/android/app/build/outputs -name "*-unsigned.apk" -o -name "*.apk" | head -1)
          # Generate debug keystore
          keytool -genkey -v -keystore /tmp/debug.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias androiddebugkey -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
          # Sign with apksigner
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign \
            --ks /tmp/debug.jks --ks-key-alias androiddebugkey \
            --ks-pass pass:android --key-pass pass:android \
            --out swallet-android-arm64.apk "$UNSIGNED"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swallet-android-arm64
          path: swallet-android-arm64.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: swallet-android-arm64.apk
          generate_release_notes: true
