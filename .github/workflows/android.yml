name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  NDK_VERSION: "27.0.12077973"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/swallet-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Build frontend
        run: cd ui && npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Configure NDK toolchain
        run: |
          NDK_HOME="${ANDROID_HOME}/ndk/${{ env.NDK_VERSION }}"
          TOOLCHAIN="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          echo "NDK_HOME=${NDK_HOME}" >> $GITHUB_ENV
          echo "${TOOLCHAIN}/bin" >> $GITHUB_PATH
          # OpenSSL vendored build needs these for aarch64
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_aarch64_linux_android=${TOOLCHAIN}/bin/llvm-ranlib" >> $GITHUB_ENV
          # armv7
          echo "CC_armv7_linux_androideabi=${TOOLCHAIN}/bin/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
          echo "AR_armv7_linux_androideabi=${TOOLCHAIN}/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_armv7_linux_androideabi=${TOOLCHAIN}/bin/llvm-ranlib" >> $GITHUB_ENV
          # x86_64
          echo "CC_x86_64_linux_android=${TOOLCHAIN}/bin/x86_64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_x86_64_linux_android=${TOOLCHAIN}/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_x86_64_linux_android=${TOOLCHAIN}/bin/llvm-ranlib" >> $GITHUB_ENV
          # i686
          echo "CC_i686_linux_android=${TOOLCHAIN}/bin/i686-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_i686_linux_android=${TOOLCHAIN}/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_i686_linux_android=${TOOLCHAIN}/bin/llvm-ranlib" >> $GITHUB_ENV

      - name: Initialize Android project
        working-directory: crates/swallet-tauri
        run: cargo tauri android init

      - name: Build Android APK (debug)
        working-directory: crates/swallet-tauri
        run: cargo tauri android build --debug

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swallet-android-debug
          path: |
            crates/swallet-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
